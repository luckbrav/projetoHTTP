<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Servidor HTTP Python</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 10px;
        }
        p { color: #666; margin-bottom: 25px; }
        .links {
            list-style-type: none;
            padding: 0;
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 30px;
        }
        .links a {
            text-decoration: none;
            background-color: #3498db;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            font-weight: bold;
            transition: background 0.3s;
        }
        .links a:hover { background-color: #2980b9; }
        hr {
            border: 0;
            height: 1px;
            background: #eee;
            margin: 30px 0;
        }
        h2 { color: #2c3e50; font-size: 1.2em; }
        form {
            display: flex;
            flex-direction: column;
            gap: 15px;
            text-align: left;
        }
        label { font-weight: bold; color: #555; }
        input[type="text"] {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 1em;
        }
        input[type="submit"] {
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1em;
            transition: background 0.3s;
        }
        input[type="submit"]:hover { background-color: #27ae60; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Bem-vindo ao Meu Servidor!</h1>
        <p>Escolha uma das páginas abaixo para testar o método GET:</p>
        
        <ul class="links">
            <li><a href="ipsum.html">Página de Texto</a></li>
            <li><a href="galeria.html">Página de Imagem</a></li>
        </ul>

        <hr>
        
        <h2>Teste de Formulário (Método POST)</h2>
        <form action="/enviar" method="POST">
            <label for="login">Nome de Login:</label>
            <input type="text" id="login" name="login" value="UtilizadorTeste">
            <input type="submit" value="Enviar Dados">
        </form>
    </div>
</body>
</html>
